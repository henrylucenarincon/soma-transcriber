profile:
  name: "Generic Marketing Course"
  language: "auto"
  content_type: "marketing video course"
  transcription_style: "literal"

transcription:
  model: "gpt-4o-mini-transcribe"
  response_format: "text"
  base_prompt: >
    This audio belongs to a marketing video course. Transcribe literally.
    Do not summarize, explain, improve, rewrite or add commentary.
    Preserve the original language, examples, colloquial expressions,
    proper names, technical terms, lists, teacher questions and topic shifts.
  course_context: >
    Generic marketing course focused on practical concepts, examples and terminology.
  proper_names: []
  glossary_terms:
    - content creation
    - social media
    - hooks
    - retention
    - storytelling
    - audience
    - conversion
    - organic growth
  preserve:
    - original language
    - campaign examples
    - platform names
    - metrics
    - technical marketing terms
    - informal expressions

audio:
  format: "mp3"
  sample_rate: 16000
  channels: 1
  bitrate: "64k"
  max_file_mb: 24
  max_chunk_minutes: 10

output:
  include_metadata: true
  markdown_heading: "Transcripción literal"

study:
  model: "gpt-4o-mini"
  output_language: "same-as-course"
  max_chars_per_analysis_chunk: 25000
  include_short_quotes: false
  quote_max_words: 20
  avoid_external_knowledge: true
