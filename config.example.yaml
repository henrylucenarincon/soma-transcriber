profile:
  name: "Generic Course"
  language: "auto"
  content_type: "online course"
  transcription_style: "literal"

transcription:
  model: "gpt-4o-mini-transcribe"
  response_format: "text"
  base_prompt: >
    This audio belongs to a video course. Transcribe literally.
    Do not summarize, explain, improve, rewrite or add commentary.
    Preserve the original language, relevant filler words, examples,
    colloquial expressions, proper names, technical terms, lists,
    teacher questions and topic shifts.
  course_context: ""
  proper_names: []
  glossary_terms: []
  preserve:
    - original language
    - relevant filler words
    - examples
    - colloquial expressions
    - proper names
    - technical terms
    - lists
    - teacher questions
    - topic shifts

audio:
  format: "mp3"
  sample_rate: 16000
  channels: 1
  bitrate: "64k"
  max_file_mb: 24
  max_chunk_minutes: 10

output:
  include_metadata: true
  markdown_heading: "Transcripción literal"
